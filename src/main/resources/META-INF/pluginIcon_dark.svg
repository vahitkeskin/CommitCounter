<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Soft Background Card (Dark) -->
    <rect x="4" y="4" width="32" height="32" rx="8" fill="url(#dark_bg)" stroke="#334155" stroke-width="1"/>
    
    <!-- Git Branch Line (Main) -->
    <path d="M12.5 9V31" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Git Branch Loop (Feature) -->
    <path d="M12.5 14.5 C18 14.5 18 24.5 12.5 24.5" stroke="#64748B" stroke-width="1.2" stroke-linecap="round"/>
    
    <!-- Git Commit Nodes -->
    <!-- Root commit -->
    <circle cx="12.5" cy="11.5" r="2" fill="#CBD5E1"/>
    
    <!-- Branch commit -->
    <circle cx="15.8" cy="19.5" r="1.8" fill="#38BDF8"/>
    
    <!-- Active commit -->
    <circle cx="12.5" cy="27.5" r="2" fill="#34D399"/>
    
    <!-- Contribution grid (Counter) -->
    <!-- Column 1 -->
    <rect x="22.5" y="9.75" width="3.5" height="3.5" rx="0.8" fill="#34D399" opacity="0.15"/>
    <rect x="22.5" y="17.75" width="3.5" height="3.5" rx="0.8" fill="#34D399" opacity="0.4"/>
    <rect x="22.5" y="25.75" width="3.5" height="3.5" rx="0.8" fill="#34D399" opacity="0.8"/>
    
    <!-- Column 2 -->
    <rect x="27.5" y="9.75" width="3.5" height="3.5" rx="0.8" fill="#34D399" opacity="0.3"/>
    <rect x="27.5" y="17.75" width="3.5" height="3.5" rx="0.8" fill="#34D399" opacity="0.6"/>
    <rect x="27.5" y="25.75" width="3.5" height="3.5" rx="0.8" fill="#34D399" opacity="1.0"/>
    
    <defs>
        <linearGradient id="dark_bg" x1="4" y1="4" x2="36" y2="36" gradientUnits="userSpaceOnUse">
            <stop stop-color="#0F172A"/>
            <stop offset="1" stop-color="#1E293B"/>
        </linearGradient>
    </defs>
</svg>
